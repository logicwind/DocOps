<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DocOps viewer</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3/dist/cytoscape.min.js"></script>
<style>
  :root {
    --ctx: #2563eb;
    --adr: #d97706;
    --tp:  #16a34a;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; }
  .prose h1 { font-size: 1.75rem; font-weight: 700; margin: 1.25rem 0 0.75rem; }
  .prose h2 { font-size: 1.35rem; font-weight: 600; margin: 1.25rem 0 0.5rem; padding-bottom: 0.25rem; border-bottom: 1px solid #e5e7eb; }
  .prose h3 { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 0.4rem; }
  .prose p, .prose ul, .prose ol, .prose table { margin: 0.5rem 0; }
  .prose ul { list-style: disc; padding-left: 1.25rem; }
  .prose ol { list-style: decimal; padding-left: 1.25rem; }
  .prose code { background: #f3f4f6; padding: 1px 5px; border-radius: 3px; font-size: 0.9em; }
  .prose pre { background: #f9fafb; border: 1px solid #e5e7eb; padding: 0.75rem; border-radius: 6px; overflow-x: auto; font-size: 0.85rem; }
  .prose pre code { background: transparent; padding: 0; }
  .prose table { border-collapse: collapse; }
  .prose th, .prose td { border: 1px solid #e5e7eb; padding: 0.35rem 0.6rem; text-align: left; }
  .prose th { background: #f9fafb; font-weight: 600; }
  .prose blockquote { border-left: 3px solid #d1d5db; padding: 0.1rem 0.8rem; color: #4b5563; font-style: italic; margin: 0.75rem 0; }
  .prose a { color: var(--ctx); text-decoration: underline; text-underline-offset: 2px; }
  a.docref-CTX, a.docref-ADR, a.docref-TP { text-decoration: underline; text-underline-offset: 2px; text-decoration-color: rgba(0,0,0,0.18); }
  a.docref-CTX:hover, a.docref-ADR:hover, a.docref-TP:hover { text-decoration-color: currentColor; }
  a.docref-CTX .docref-id, a.docref-ADR .docref-id, a.docref-TP .docref-id { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.85em; }
  a.docref-CTX { color: var(--ctx); }
  a.docref-ADR { color: var(--adr); }
  a.docref-TP  { color: var(--tp);  }
  a.docref-CTX .docref-title, a.docref-ADR .docref-title, a.docref-TP .docref-title { color: #374151; }
  .kind-dot-CTX { background: var(--ctx); }
  .kind-dot-ADR { background: var(--adr); }
  .kind-dot-TP  { background: var(--tp);  }
  .tree-row.active { background: #eef2ff; color: #111827; }
  #graph { height: calc(100vh - 3.5rem); }
</style>
</head>
<body class="bg-white text-gray-900">

<header class="h-14 sticky top-0 z-20 bg-white border-b border-gray-200 flex items-center px-4 gap-4">
  <a href="#/" class="font-semibold tracking-tight">DocOps</a>
  <nav class="flex gap-1 text-sm">
    <a href="#/" class="px-2 py-1 rounded hover:bg-gray-100">Home</a>
    <a href="#/graph" class="px-2 py-1 rounded hover:bg-gray-100">Graph</a>
  </nav>
  <div class="flex-1"></div>
  <input id="search" placeholder="search docs…" class="w-60 text-sm px-2 py-1 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-300">
  <span id="meta" class="text-xs text-gray-500"></span>
</header>

<div class="flex h-[calc(100vh-3.5rem)]">
  <aside id="sidebar" class="w-72 shrink-0 border-r border-gray-200 overflow-y-auto text-sm"></aside>
  <main id="main" class="flex-1 overflow-y-auto"></main>
</div>

<script>
/* DocOps SPA — single-file viewer */

const state = {
  index: null,        // full index.json
  byId: new Map(),    // ID → IndexedDoc
  baseUrl: document.querySelector('base')?.getAttribute('href') || '',
};

function url(p) { return (state.baseUrl || '') + p; }

/* ---------------------------------------------------------- boot */

async function boot() {
  try {
    const res = await fetch(url('index.json'), { cache: 'no-cache' });
    state.index = await res.json();
    for (const d of state.index.docs) state.byId.set(d.id, d);
    document.getElementById('meta').textContent =
      `${state.index.docs.length} docs · v${state.index.version}`;
  } catch (e) {
    document.getElementById('main').innerHTML =
      `<div class="p-6 text-red-600">Failed to load index.json: ${escapeHtml(String(e))}</div>`;
    return;
  }
  renderSidebar();
  window.addEventListener('hashchange', route);
  document.getElementById('search').addEventListener('input', () => renderSidebar());
  route();
}

/* ---------------------------------------------------------- sidebar */

function renderSidebar() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const groups = { CTX: [], ADR: [], TP: [] };
  for (const d of state.index.docs) {
    if (!groups[d.kind]) continue;
    if (q && !(`${d.id} ${d.title || ''}`.toLowerCase().includes(q))) continue;
    groups[d.kind].push(d);
  }
  for (const k of Object.keys(groups)) {
    groups[k].sort((a, b) => a.id.localeCompare(b.id));
  }
  const labels = { CTX: 'Context', ADR: 'Decisions', TP: 'Tasks' };
  const counts = { CTX: groups.CTX.length, ADR: groups.ADR.length, TP: groups.TP.length };
  const active = currentRoute().id;

  const html = Object.keys(groups).map(k => `
    <details open class="border-b border-gray-100">
      <summary class="cursor-pointer select-none px-3 py-2 flex items-center gap-2 text-gray-700 hover:bg-gray-50">
        <span class="inline-block w-2 h-2 rounded-full kind-dot-${k}"></span>
        <span class="font-semibold">${labels[k]}</span>
        <span class="text-xs text-gray-400">${counts[k]}</span>
      </summary>
      <ul>
        ${groups[k].map(d => `
          <li>
            <a href="#/${d.kind}/${d.id}"
               class="tree-row block px-3 py-1.5 pl-6 hover:bg-gray-50 ${d.id === active ? 'active' : ''}">
              <div class="flex items-center gap-2">
                <span class="text-xs font-mono text-gray-500 shrink-0">${d.id}</span>
                ${statusBadge(d)}
              </div>
              <div class="text-gray-800 truncate">${escapeHtml(d.title || '(untitled)')}</div>
            </a>
          </li>
        `).join('')}
      </ul>
    </details>
  `).join('');
  document.getElementById('sidebar').innerHTML = html;
}

function statusBadge(d) {
  const s = d.status || d.task_status || d.type;
  if (!s) return '';
  const palette = {
    draft: 'bg-gray-200 text-gray-800',
    accepted: 'bg-amber-100 text-amber-800',
    superseded: 'bg-red-100 text-red-800',
    backlog: 'bg-gray-100 text-gray-700',
    active: 'bg-indigo-100 text-indigo-800',
    'in-progress': 'bg-indigo-100 text-indigo-800',
    blocked: 'bg-orange-100 text-orange-800',
    done: 'bg-green-100 text-green-800',
  };
  const cls = palette[s] || 'bg-gray-100 text-gray-700';
  return `<span class="text-[10px] px-1.5 py-0.5 rounded ${cls}">${escapeHtml(s)}</span>`;
}

/* ---------------------------------------------------------- routing */

function currentRoute() {
  const h = (location.hash || '#/').slice(1);
  const parts = h.split('/').filter(Boolean);
  if (parts.length === 0) return { view: 'home' };
  if (parts[0] === 'graph') return { view: 'graph' };
  if (parts[0] === 'state') return { view: 'state' };
  if (['CTX', 'ADR', 'TP'].includes(parts[0]) && parts[1]) {
    return { view: 'doc', kind: parts[0], id: parts[1] };
  }
  return { view: 'home' };
}

async function route() {
  const r = currentRoute();
  renderSidebar();
  if (r.view === 'home')  return renderHome();
  if (r.view === 'graph') return renderGraph();
  if (r.view === 'state') return renderState();
  if (r.view === 'doc')   return renderDoc(r.id);
}

/* ---------------------------------------------------------- home view */

async function renderHome() {
  const counts = { CTX: 0, ADR: 0, TP: 0 };
  for (const d of state.index.docs) counts[d.kind] = (counts[d.kind] || 0) + 1;
  const tiles = [
    { k: 'CTX', label: 'Context', color: 'var(--ctx)' },
    { k: 'ADR', label: 'Decisions', color: 'var(--adr)' },
    { k: 'TP',  label: 'Tasks', color: 'var(--tp)'  },
  ].map(t => `
    <a href="#/${t.k}/${firstOfKind(t.k)}" class="block p-5 border border-gray-200 rounded-lg hover:shadow-sm transition bg-white">
      <div class="w-2 h-2 rounded-full mb-2" style="background:${t.color}"></div>
      <div class="text-3xl font-bold">${counts[t.k] || 0}</div>
      <div class="text-sm text-gray-500">${t.label}</div>
    </a>
  `).join('');

  const stateMd = state.index.state_md || '';

  document.getElementById('main').innerHTML = `
    <div class="max-w-4xl mx-auto p-6">
      <h1 class="text-2xl font-bold mb-1">Project state</h1>
      <p class="text-sm text-gray-500 mb-4">Generated ${escapeHtml(state.index.generated_at || '')}</p>
      <div class="grid grid-cols-3 gap-3 mb-6">${tiles}</div>
      <article class="prose">${stateMd ? linkifyIds(renderMarkdown(stateMd)) : '<p class="text-gray-500">No STATE.md available.</p>'}</article>
      ${renderRecentAmendments()}
    </div>
  `;
}

function firstOfKind(k) {
  const d = state.index.docs.filter(x => x.kind === k).sort((a,b) => a.id.localeCompare(b.id))[0];
  return d ? d.id : '';
}

/* ---------------------------------------------------------- doc view */

function renderDoc(id) {
  const doc = state.byId.get(id);
  if (!doc) {
    document.getElementById('main').innerHTML =
      `<div class="p-6"><h1 class="text-xl font-semibold">Not found</h1>
       <p class="text-gray-600">No document with ID <code>${escapeHtml(id)}</code>.</p></div>`;
    return;
  }

  const body = doc.body || '';
  const rendered = renderMarkdown(body);
  const linkified = linkifyIds(rendered);

  const refs = renderReverseEdges(doc);

  document.getElementById('main').innerHTML = `
    <div class="max-w-4xl mx-auto p-6">
      <nav class="text-xs text-gray-500 mb-3">
        <a href="#/" class="hover:underline">Home</a>
        <span class="mx-1">›</span>
        <span>${kindLabel(doc.kind)}</span>
        <span class="mx-1">›</span>
        <span class="font-mono">${doc.id}</span>
      </nav>
      <div class="flex items-start gap-3 mb-3">
        <span class="inline-block w-3 h-3 rounded-full mt-2 kind-dot-${doc.kind}"></span>
        <div class="flex-1">
          <h1 class="text-2xl font-bold leading-tight">${escapeHtml(doc.title || doc.id)}</h1>
          <div class="text-sm text-gray-500 font-mono">${doc.id}</div>
        </div>
        ${statusBadge(doc)}
      </div>
      ${renderFrontmatterTable(doc)}
      ${refs}
      <article class="prose mt-4">${linkified}</article>
      ${renderAmendments(doc)}
      <footer class="mt-10 pt-4 border-t border-gray-100 text-xs text-gray-400">
        ${escapeHtml(doc.path)} · last touched ${escapeHtml(doc.last_touched || '')}
      </footer>
    </div>
  `;
}

function renderFrontmatterTable(doc) {
  const rows = [];
  const push = (k, v) => { if (v !== undefined && v !== null && v !== '' && !(Array.isArray(v) && v.length === 0)) rows.push([k, v]); };

  push('kind', doc.kind);
  if (doc.kind === 'ADR') {
    push('status', doc.status);
    push('coverage', doc.coverage);
    push('date', doc.date);
    push('related', doc.related);
    push('supersedes', doc.supersedes);
    push('superseded_by', doc.superseded_by);
    push('tags', doc.tags);
  } else if (doc.kind === 'TP') {
    push('status', doc.task_status);
    push('priority', doc.priority);
    push('assignee', doc.assignee);
    push('requires', doc.requires);
    push('depends_on', doc.depends_on);
  } else if (doc.kind === 'CTX') {
    push('type', doc.type);
    push('supersedes', doc.supersedes);
    push('superseded_by', doc.superseded_by);
  }

  if (rows.length === 0) return '';
  return `
    <table class="text-sm border border-gray-200 rounded mb-3 w-full">
      <tbody>
        ${rows.map(([k, v]) => `
          <tr class="border-b border-gray-100">
            <td class="px-3 py-1.5 font-semibold text-gray-600 w-40 bg-gray-50 align-top">${escapeHtml(k)}</td>
            <td class="px-3 py-1.5 align-top">${formatValue(v)}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function formatValue(v) {
  if (Array.isArray(v)) {
    if (v.length > 0 && v.every(x => /^(CTX|ADR|TP)-\d+$/.test(String(x)))) {
      return `<ul class="space-y-0.5">${v.map(x => `<li>${linkifyIdWithTitle(String(x))}</li>`).join('')}</ul>`;
    }
    return v.map(x => linkifyIdString(String(x))).join(', ');
  }
  return linkifyIdString(String(v));
}

function renderReverseEdges(doc) {
  const groups = [];
  const add = (label, items, mapper) => {
    if (!items || items.length === 0) return;
    const lis = items.map(i => `<li>${mapper(i)}</li>`).join('');
    groups.push(`<div><div class="text-gray-500 text-xs uppercase tracking-wide mb-0.5">${label}</div><ul class="space-y-0.5 ml-1">${lis}</ul></div>`);
  };
  add('Referenced by', doc.referenced_by, r => linkifyIdWithTitle(r.id) + ` <span class="text-gray-400 text-xs">(${escapeHtml(r.edge)})</span>`);
  add('Superseded by', doc.superseded_by, x => linkifyIdWithTitle(x));
  add('Derived ADRs', doc.derived_adrs, x => linkifyIdWithTitle(x));
  add('Active tasks', doc.active_tasks, x => linkifyIdWithTitle(x));
  add('Blocks',       doc.blocks, x => linkifyIdWithTitle(x));
  if (groups.length === 0) return '';
  return `<div class="text-sm bg-indigo-50/50 border border-indigo-100 rounded p-3 mb-3 space-y-2">${groups.join('')}</div>`;
}

function renderAmendments(doc) {
  const amends = doc.amendments;
  if (!amends || amends.length === 0) return '';
  const rows = amends.map(a => `
    <li class="border-l-2 border-amber-300 pl-3 py-1">
      <div class="text-xs text-gray-500 font-mono">
        ${escapeHtml(a.date || '')}
        <span class="ml-2 px-1.5 py-0.5 rounded bg-amber-100 text-amber-800 text-[10px] uppercase tracking-wide">${escapeHtml(a.kind || '')}</span>
        ${a.by ? `<span class="ml-2">${escapeHtml(a.by)}</span>` : ''}
        ${a.ref ? `<span class="ml-2">${linkifyIdString(a.ref)}</span>` : ''}
      </div>
      <div class="text-sm">${escapeHtml(a.summary || '')}</div>
      ${a.affects_sections && a.affects_sections.length
        ? `<div class="text-xs text-gray-500 mt-0.5">affects: ${a.affects_sections.map(s => `<code class="bg-gray-100 px-1 rounded">${escapeHtml(s)}</code>`).join(', ')}</div>`
        : ''}
    </li>
  `).join('');
  return `
    <section class="mt-8">
      <h2 class="text-sm font-semibold text-gray-700 mb-2">Amendments <span class="text-gray-400 font-normal">(${amends.length})</span></h2>
      <ul class="space-y-2">${rows}</ul>
    </section>
  `;
}

function renderRecentAmendments() {
  const list = state.index.recent_amendments;
  if (!list || list.length === 0) return '';
  const rows = list.slice(0, 10).map(a => `
    <li class="text-sm">
      <span class="text-xs text-gray-400 font-mono">${escapeHtml(a.date || '')}</span>
      ${linkifyIdString(a.adr)}
      <span class="px-1.5 py-0.5 rounded bg-amber-100 text-amber-800 text-[10px] uppercase tracking-wide">${escapeHtml(a.kind || '')}</span>
      ${escapeHtml(a.summary || '')}
      ${a.by ? `<span class="text-xs text-gray-500">— ${escapeHtml(a.by)}</span>` : ''}
    </li>
  `).join('');
  return `
    <section class="mt-6">
      <h2 class="text-sm font-semibold text-gray-700 mb-2">Recent amendments</h2>
      <ul class="space-y-1">${rows}</ul>
    </section>
  `;
}

/* ---------------------------------------------------------- state view */

function renderState() {
  const md = state.index.state_md || '';
  document.getElementById('main').innerHTML = `
    <div class="max-w-4xl mx-auto p-6">
      <nav class="text-xs text-gray-500 mb-3"><a href="#/" class="hover:underline">Home</a> <span class="mx-1">›</span> STATE</nav>
      <article class="prose">${md ? linkifyIds(renderMarkdown(md)) : '<p class="text-gray-500">No STATE.md found.</p>'}</article>
    </div>
  `;
}

/* ---------------------------------------------------------- graph view */

function renderGraph() {
  document.getElementById('main').innerHTML = `
    <div class="relative">
      <div id="graph-legend" class="absolute top-3 right-3 z-10 bg-white/90 backdrop-blur border border-gray-200 rounded p-2 text-xs shadow-sm">
        <div class="flex items-center gap-2 mb-1"><span class="inline-block w-2 h-2 rounded-full kind-dot-CTX"></span>Context</div>
        <div class="flex items-center gap-2 mb-1"><span class="inline-block w-2 h-2 rounded-full kind-dot-ADR"></span>Decisions</div>
        <div class="flex items-center gap-2 mb-2"><span class="inline-block w-2 h-2 rounded-full kind-dot-TP"></span>Tasks</div>
        <div class="border-t border-gray-100 pt-1.5 space-y-0.5 text-gray-600">
          <div><span class="inline-block w-4 h-0.5 align-middle mr-1" style="background:#dc2626"></span>supersedes</div>
          <div><span class="inline-block w-4 h-0.5 align-middle mr-1" style="background:#2563eb"></span>requires</div>
          <div><span class="inline-block w-4 h-0.5 align-middle mr-1" style="background:#7c3aed"></span>depends_on</div>
          <div><span class="inline-block w-4 h-0.5 align-middle mr-1" style="background:#9ca3af"></span>related</div>
        </div>
        <div class="border-t border-gray-100 mt-1.5 pt-1.5 text-[10px] text-gray-500 leading-tight">
          hover · focus<br>click · pin<br>dbl-click · open
        </div>
      </div>
      <div id="graph"></div>
    </div>
  `;

  const kindColor = { CTX: '#2563eb', ADR: '#d97706', TP: '#16a34a' };
  const edgeColor = {
    supersedes: '#dc2626',
    related:    '#9ca3af',
    requires:   '#2563eb',
    depends_on: '#7c3aed',
  };

  // Pinned column layout: CTX (1 col) | ADR (2 cols) | TP (3 cols).
  // Column-major fill so IDs stack in numerical order down each column.
  const kindConfig = {
    CTX: { cols: 1, xOffset: 0 },
    ADR: { cols: 2, xOffset: 340 },
    TP:  { cols: 3, xOffset: 900 },
  };
  const colGap = 170;
  const rowGap = 46;
  const headerY = -60;

  const byKind = { CTX: [], ADR: [], TP: [] };
  for (const d of state.index.docs) if (byKind[d.kind]) byKind[d.kind].push(d);
  for (const k of Object.keys(byKind)) byKind[k].sort((a, b) => a.id.localeCompare(b.id));

  const positions = new Map();
  for (const [k, cfg] of Object.entries(kindConfig)) {
    const list = byKind[k];
    const rowsPerCol = Math.max(1, Math.ceil(list.length / cfg.cols));
    list.forEach((d, i) => {
      const col = Math.floor(i / rowsPerCol);
      const row = i % rowsPerCol;
      positions.set(d.id, { x: cfg.xOffset + col * colGap, y: row * rowGap });
    });
  }

  const nodes = state.index.docs.map(d => ({
    data: { id: d.id, label: d.id, kind: d.kind, title: d.title || '' },
    position: positions.get(d.id),
    grabbable: true,
  }));

  // Section headers as non-interactive label nodes above each column group.
  const headerNodes = [
    { id: '__h_CTX', label: 'Context',   kind: 'CTX', x: kindConfig.CTX.xOffset },
    { id: '__h_ADR', label: 'Decisions', kind: 'ADR', x: kindConfig.ADR.xOffset + ((kindConfig.ADR.cols - 1) * colGap) / 2 },
    { id: '__h_TP',  label: 'Tasks',     kind: 'TP',  x: kindConfig.TP.xOffset  + ((kindConfig.TP.cols  - 1) * colGap) / 2 },
  ].map(h => ({
    data: { id: h.id, label: h.label, kind: h.kind, isHeader: true },
    position: { x: h.x, y: headerY },
    selectable: false,
    grabbable: false,
  }));

  const edges = [];
  const seen = new Set();
  const addEdge = (from, to, type) => {
    if (!state.byId.has(to)) return;
    const key = `${from}|${to}|${type}`;
    if (seen.has(key)) return;
    seen.add(key);
    edges.push({ data: { id: key, source: from, target: to, type } });
  };
  for (const d of state.index.docs) {
    (d.supersedes || []).forEach(t => addEdge(d.id, t, 'supersedes'));
    (d.related || []).forEach(t => addEdge(d.id, t, 'related'));
    (d.requires || []).forEach(t => addEdge(d.id, t, 'requires'));
    (d.depends_on || []).forEach(t => addEdge(d.id, t, 'depends_on'));
  }

  const cy = cytoscape({
    container: document.getElementById('graph'),
    elements: [...headerNodes, ...nodes, ...edges],
    style: [
      {
        selector: 'node',
        style: {
          'background-color': n => kindColor[n.data('kind')] || '#6b7280',
          'label': 'data(label)',
          'font-size': 10,
          'color': '#111827',
          'text-valign': 'center',
          'text-halign': 'right',
          'text-margin-x': 5,
          'width': 14,
          'height': 14,
        }
      },
      {
        selector: 'node[?isHeader]',
        style: {
          'background-color': '#ffffff',
          'background-opacity': 0,
          'border-width': 0,
          'label': 'data(label)',
          'font-size': 14,
          'font-weight': 700,
          'color': n => kindColor[n.data('kind')] || '#111827',
          'text-valign': 'center',
          'text-halign': 'center',
          'text-margin-x': 0,
          'width': 1,
          'height': 1,
        }
      },
      {
        selector: 'edge',
        style: {
          'width': 1.1,
          'line-color': e => edgeColor[e.data('type')] || '#d1d5db',
          'curve-style': 'bezier',
          'target-arrow-shape': 'triangle',
          'target-arrow-color': e => edgeColor[e.data('type')] || '#d1d5db',
          'arrow-scale': 0.7,
          'opacity': 0.55,
        }
      },
      {
        selector: '.faded',
        style: {
          'opacity': 0.08,
          'text-opacity': 0.15,
          'transition-property': 'opacity, text-opacity',
          'transition-duration': '150ms',
        }
      },
      {
        selector: 'node.focused',
        style: {
          'border-width': 2.5,
          'border-color': '#111827',
          'width': 18,
          'height': 18,
          'font-weight': 700,
          'opacity': 1,
          'text-opacity': 1,
          'z-index': 999,
        }
      },
      {
        selector: 'node.neighbor',
        style: {
          'border-width': 1.5,
          'border-color': '#111827',
          'font-weight': 600,
          'opacity': 1,
          'text-opacity': 1,
          'z-index': 998,
        }
      },
      {
        selector: 'edge.incident',
        style: {
          'width': 2.4,
          'opacity': 1,
          'arrow-scale': 1,
          'z-index': 997,
        }
      },
      {
        selector: 'node:selected',
        style: { 'border-width': 3, 'border-color': '#111827' }
      }
    ],
    layout: { name: 'preset' },
    wheelSensitivity: 0.3,
    minZoom: 0.3,
    maxZoom: 2.5,
  });
  cy.fit(undefined, 40);
  window.__docopsCy = cy; // escape hatch for devtools + e2e tests

  /* ---- interactivity: hover focus, click pin, dbl-click open ---- */

  let pinnedId = null;

  const clearHighlights = () => {
    cy.elements().removeClass('faded focused neighbor incident');
  };
  const highlightNode = (n) => {
    clearHighlights();
    const nhood = n.closedNeighborhood();
    // Protect section header pseudo-nodes from the dim pass.
    const headers = cy.nodes('[?isHeader]');
    cy.elements().not(nhood).not(headers).addClass('faded');
    nhood.nodes().not(n).not(headers).addClass('neighbor');
    nhood.edges().addClass('incident');
    n.addClass('focused');
  };

  cy.on('mouseover', 'node', e => {
    if (e.target.data('isHeader')) return;
    if (pinnedId) return; // pinned selection wins over transient hover
    highlightNode(e.target);
  });
  cy.on('mouseout', 'node', e => {
    if (pinnedId) return;
    if (e.target.data('isHeader')) return;
    clearHighlights();
  });

  // Single tap toggles pin. Double tap opens the doc.
  let lastTap = { id: null, t: 0 };
  const DOUBLE_MS = 350;
  cy.on('tap', 'node', e => {
    if (e.target.data('isHeader')) return;
    const id = e.target.id();
    const now = Date.now();
    if (lastTap.id === id && now - lastTap.t < DOUBLE_MS) {
      // Double-tap: navigate.
      lastTap = { id: null, t: 0 };
      const d = state.byId.get(id);
      if (d) location.hash = `#/${d.kind}/${d.id}`;
      return;
    }
    lastTap = { id, t: now };
    // Single-tap: pin / unpin.
    if (pinnedId === id) {
      pinnedId = null;
      clearHighlights();
    } else {
      pinnedId = id;
      highlightNode(e.target);
    }
  });

  // Tap on blank background clears the pin.
  cy.on('tap', e => {
    if (e.target === cy) {
      pinnedId = null;
      clearHighlights();
    }
  });
}

/* ---------------------------------------------------------- markdown helpers */

function renderMarkdown(md) {
  if (!md) return '';
  marked.setOptions({ gfm: true, breaks: false, headerIds: false, mangle: false });
  return marked.parse(md);
}

function linkifyIds(html) {
  // Rewrite ADR-nnnn / CTX-nnn / TP-nnn tokens to clickable links, but skip
  // matches that are already inside an <a ...>...</a>.
  return html.replace(/(<a [^>]*>[\s\S]*?<\/a>)|\b(CTX-\d+|ADR-\d+|TP-\d+)\b/g,
    (m, anchor, id) => anchor ? anchor : linkifyIdString(id));
}

function linkifyIdString(s) {
  const m = String(s).match(/^(CTX|ADR|TP)-\d+$/);
  if (!m) return escapeHtml(String(s));
  const kind = m[1];
  return `<a href="#/${kind}/${s}" class="docref-${kind}">${escapeHtml(s)}</a>`;
}

function linkifyIdWithTitle(s) {
  const id = String(s);
  const m = id.match(/^(CTX|ADR|TP)-\d+$/);
  if (!m) return escapeHtml(id);
  const kind = m[1];
  const d = state.byId.get(id);
  const title = d && d.title ? d.title : '';
  const titleHtml = title ? ` <span class="docref-title">${escapeHtml(title)}</span>` : '';
  const badge = d ? statusBadge(d) : '';
  const badgeHtml = badge ? ` ${badge}` : '';
  return `<a href="#/${kind}/${id}" class="docref-${kind}"><span class="docref-id">${escapeHtml(id)}</span>${titleHtml}</a>${badgeHtml}`;
}

function kindLabel(k) {
  return { CTX: 'Context', ADR: 'Decision', TP: 'Task' }[k] || k;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

boot();
</script>
</body>
</html>
