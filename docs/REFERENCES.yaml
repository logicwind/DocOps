# Zund — External References
# URLs and resources we refer to during design and implementation.

# ---------------------------------------------------------------------------
# Infrastructure
# ---------------------------------------------------------------------------

incus:
  docs: https://linuxcontainers.org/incus/docs/main/
  rest-api: https://linuxcontainers.org/incus/docs/main/rest-api/
  github: https://github.com/lxc/incus
  notes: >
    Container/VM runtime. zundd talks to Incus via REST over Unix socket.
    REST API docs are the primary reference for the IncusClient.

code-on-incus:
  github: https://github.com/mensfeld/code-on-incus
  notes: >
    Production-validated pattern for running coding agents in Incus containers
    with host-mounted workspaces and UID shifting. Reference for mount config,
    session directory structure, and tmux session lifecycle.

# ---------------------------------------------------------------------------
# Agent Runtime
# ---------------------------------------------------------------------------

pi:
  website: https://shittycodingagent.ai/
  github: https://github.com/badlogic/pi-mono
  npm: https://www.npmjs.com/package/@mariozechner/pi-coding-agent
  notes: >
    Embedded agent runtime. Pi runs inside Incus containers.
    Extension system: .ts files loaded via jiti, registered with pi.registerTool().
    RPC mode: pi --mode rpc (JSON over stdin/stdout).
    Web UI package: @mariozechner/pi-web-ui (reference only, not used in production).

# ---------------------------------------------------------------------------
# Skills & Tools Standards
# ---------------------------------------------------------------------------

agent-skills-spec:
  website: https://agentskills.io/home
  llms-txt: https://agentskills.io/llms-full.txt
  notes: >
    Open standard for agent skills. SKILL.md with YAML frontmatter.
    Defines: name, description, license, compatibility, allowed-tools, metadata.
    Directory structure: SKILL.md + resources/ + references/ + assets/.
    Adopted by Claude Code, Copilot, Cursor, and Pi.

skills-sh:
  website: https://skills.sh/
  notes: >
    Registry/marketplace for agent skills (~91K skills).
    Install via: npx skills add owner/repo.
    Good reference for real-world skill patterns and directory structures.
    Skills are prompt-engineering + shell scripts, not structured tool APIs.

mcp:
  spec: https://modelcontextprotocol.io/specification/2025-11-25
  website: https://modelcontextprotocol.io/
  notes: >
    Model Context Protocol — Anthropic's standard for tool providers.
    JSON Schema tool definitions, stdio or HTTP transport.
    Distributed as npm/pip packages or HTTP endpoints.
    Cross-agent standard — works with Claude, Cursor, VS Code, etc.

the-library:
  github: https://github.com/disler/the-library
  notes: >
    Skill registry pattern — a curated library of agent skills organized as
    git repos. Reference for how to structure a skill marketplace/registry,
    discovery, and distribution. Relevant for Zund's future skill library feature.

# ---------------------------------------------------------------------------
# How these map to Zund
# ---------------------------------------------------------------------------
#
# Prompt skills (SKILL.md)  → follow Agent Skills spec, self-contained directories
# Tool providers (MCP)      → standard MCP servers, zundd can expose to containers
# Pi-native tools            → Pi extensions (.ts), for Zund-specific tools (fleet, memory)
# Infrastructure patterns    → Code on Incus for mount/session patterns
