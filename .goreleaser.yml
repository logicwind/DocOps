version: 2

project_name: docops

before:
  hooks:
    - go mod tidy

builds:
  - id: docops
    main: ./cmd/docops
    binary: docops
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/logicwind/docops/internal/version.Version={{.Version}}
      - -X github.com/logicwind/docops/internal/version.Commit={{.Commit}}
      - -X github.com/logicwind/docops/internal/version.Date={{.Date}}

archives:
  - id: docops
    ids: [docops]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

# Homebrew tap — stub. skip_upload: true until `logicwind/homebrew-docops` repo exists (ADR-0019).
brews:
  - name: docops
    ids: [docops]
    repository:
      owner: logicwind
      name: homebrew-docops
    description: "Typed project-state substrate for LLM-first software development"
    homepage: "https://github.com/logicwind/DocOps"
    license: MIT
    skip_upload: true
    test: |
      system "#{bin}/docops --version"

# Scoop bucket — stub. skip_upload: true until `logicwind/scoop-docops` repo exists (ADR-0019).
scoops:
  - name: docops
    ids: [docops]
    repository:
      owner: logicwind
      name: scoop-docops
    description: "Typed project-state substrate for LLM-first software development"
    homepage: "https://github.com/logicwind/DocOps"
    license: MIT
    skip_upload: true
